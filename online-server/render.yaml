services:
  - type: web
    name: ysale-online-api
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: CONTROL_DATABASE_URL
        sync: false
      - key: SYSTEM_ADMIN_USERNAME
        value: admin
      - key: SYSTEM_ADMIN_PASSWORD
        sync: false
